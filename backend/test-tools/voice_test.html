<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSmart AI | Voice Agent Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { margin: 0 0 0.5rem; font-weight: 600; font-size: 2rem; }
        p { color: var(--text-dim); margin-bottom: 2rem; }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            margin-bottom: 1.5rem;
            color: #ef4444;
        }
        .status-badge.online { color: #10b981; }

        .visualizer-container {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2rem;
        }

        .bar {
            width: 8px;
            background: var(--primary);
            border-radius: 4px;
            transition: height 0.1s ease;
            height: 10px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        #connectBtn { background: var(--primary); color: white; }
        #connectBtn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        #connectBtn:disabled { background: #475569; opacity: 0.5; }

        #log {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 12px;
            height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-entry { margin-bottom: 0.5rem; border-left: 2px solid var(--primary); padding-left: 0.5rem; }
        .log-entry.ai { border-left-color: #10b981; }

        /* Animation for the visualizer */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-badge">Offline</div>
    <h1>Voice Agent Console</h1>
    <p>Test your Gemini Live agent without verification.</p>

    <div class="visualizer-container" id="visualizer">
        <!-- Bars will be generated here -->
    </div>

    <div class="controls">
        <button id="connectBtn">Start Conversation</button>
    </div>

    <div id="log">
        <div class="log-entry">System: Press "Start" to begin...</div>
    </div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const statusBadge = document.getElementById('status');
    const logEl = document.getElementById('log');
    const visContainer = document.getElementById('visualizer');

    // Create visualizer bars
    for(let i=0; i<20; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        visContainer.appendChild(bar);
    }
    const bars = document.querySelectorAll('.bar');

    let ws;
    let audioContext;
    let processor;
    let source;
    let audioQueue = [];
    let isPlaying = false;

    async function start() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Setup WebSocket
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/api/voice/ws/browser`);
            
            ws.onopen = () => {
                statusBadge.textContent = 'Online';
                statusBadge.classList.add('online');
                connectBtn.textContent = 'End Session';
                log('System: Connected to Gemini Live API');
            };

            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'audio') {
                    const audioData = atob(msg.data);
                    const buf = new Int16Array(audioData.length / 2);
                    for (let i = 0; i < buf.length; i++) {
                        buf[i] = (audioData.charCodeAt(i * 2) | (audioData.charCodeAt(i * 2 + 1) << 8));
                    }
                    enqueueAudio(buf);
                } else if (msg.type === 'text') {
                    log(`AI: ${msg.data}`, 'ai');
                } else if (msg.type === 'thought') {
                    log(`Thought: ${msg.data}`);
                }
            };

            // Setup Recording (16kHz PCM)
            source = audioContext.createMediaStreamSource(stream);
            // Reduced buffer size for lower latency (512 samples = ~32ms)
            processor = audioContext.createScriptProcessor(512, 1, 1);
            
            processor.onaudioprocess = (e) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Convert Float32 to Int16
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    
                    // Simple viz
                    const val = Math.abs(inputData[0]) * 100;
                    updateViz(val);

                    // Send to WS
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                    ws.send(json({ type: "audio", data: base64Audio }));
                }
            };

            source.connect(processor);
            processor.connect(audioContext.destination);

        } catch (err) {
            log(`Error: ${err.message}`);
        }
    }

    function log(text, type='') {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.textContent = text;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateViz(val) {
        bars.forEach(bar => {
            const h = Math.max(10, Math.random() * val * 2);
            bar.style.height = `${h}px`;
        });
    }

    let nextStartTime = 0;
    function enqueueAudio(pcmData) {
        if (!audioContext) return;
        
        const float32 = new Float32Array(pcmData.length);
        for(let i=0; i<pcmData.length; i++) float32[i] = pcmData[i] / 0x7FFF;
        
        const audioBuf = audioContext.createBuffer(1, float32.length, 24000);
        audioBuf.getChannelData(0).set(float32);
        
        const source = audioContext.createBufferSource();
        source.buffer = audioBuf;
        source.connect(audioContext.destination);

        // Advanced Scheduling to prevent gaps
        const currentTime = audioContext.currentTime;
        if (nextStartTime < currentTime) {
            nextStartTime = currentTime + 0.05; // Small grace period
        }
        
        source.start(nextStartTime);
        nextStartTime += audioBuf.duration;
    }

    function json(obj) { return JSON.stringify(obj); }

    connectBtn.onclick = () => {
        if (ws) {
            ws.close();
            window.location.reload();
        } else {
            start();
        }
    };
</script>

</body>
</html>
