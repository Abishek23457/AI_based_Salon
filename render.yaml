services:
  # 1. React/Vite Frontend
  - type: web
    name: booksmart-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://booksmart-backend.onrender.com
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000
    routes:
      - src: /*
        dest: /index.html

  # 2. FastAPI Backend
  - type: web
    name: booksmart-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booksmart-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      # Add your API keys below in Render dashboard → Environment
      # - key: GEMINI_API_KEY
      #   value: your_key_here
      # - key: DEEPGRAM_API_KEY
      #   value: your_key_here

databases:
  # 3. PostgreSQL Database
  - name: booksmart-db
    plan: free
