services:
  # 1. React/Vite Frontend
  - type: web
    name: booksmart-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000
    routes:
      - src: /*
        dest: /index.html

  # 2. FastAPI Backend
  - type: web
    name: booksmart-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booksmart-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  # 3. PostgreSQL Database
  - name: booksmart-db
    plan: free
